<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFL Community Farm Timers</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            min-height: 100vh;
            color: #0f172a;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #3730a3 100%);
        }
        .page-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8px 8px;
        }
        .global-timer-section {
            grid-column: 1 / -1; /* Span all columns */
            display: flex;
            justify-content: center;
            width: 100%;
            margin: 2px 0;
            display: none; /* Hidden by default, shown when there are global timers */
            box-sizing: border-box;
            padding: 0;
            overflow: hidden;
        }
        .global-timer-card {
            background: linear-gradient(135deg, #fffbeb, #fef3c7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 4px;
            padding: 2px 6px;
            box-shadow: 0 1px 4px rgba(245, 158, 11, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
            width: 100%;
            max-width: 100%;
            height: 24px;
            min-height: 24px;
            box-sizing: border-box;
            overflow: hidden;
        }
        .global-timer-label {
            font-weight: 600;
            font-size: 0.75rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 3px;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .global-timer-emoji {
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .global-timer-countdown {
            text-align: center;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.7rem;
            font-weight: 600;
            color: #3b82f6;
            white-space: nowrap;
            flex: 0 0 auto;
        }
        .daily-timer-hide-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            flex-shrink: 0;
            transition: color 0.2s, opacity 0.2s;
            opacity: 0;
        }
        .global-timer-card:hover .daily-timer-hide-btn {
            opacity: 1;
        }
        .daily-timer-hide-btn:hover {
            color: #ef4444;
        }
        .farm-container {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .summaries-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 0;
            transition: margin-bottom 0.2s ease;
        }
        .summaries-row.has-global-timers {
            margin-bottom: 16px;
        }
        .timers-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }
        .global-timer-section {
            grid-column: 1 / -1; /* Span all columns */
            display: flex;
            justify-content: center;
            width: 100%;
            margin: 0;
            display: none; /* Hidden by default, shown when there are global timers */
            box-sizing: border-box;
            padding: 0;
            overflow: hidden;
        }
        .global-timer-section.show {
            display: flex;
            margin: 0;
        }
        #floating-island-timers.show {
            margin-bottom: 2px;
            width: 100%;
        }
        #daily-timers.show {
            margin-bottom: 2px;
            width: 100%;
        }
        .farm-column {
            min-width: 260px;
        }
        h2 {
            font-size: 1rem;
            margin: 0 0 6px 0;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 8px 12px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.8), rgba(139, 92, 246, 0.8));
            border-radius: 8px 8px 0 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .section {
            margin-bottom: 6px;
        }
        .section#timers1, .section#timers2, .section#timers3 {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        .panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 4px 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        .timer-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 3px;
            width: 100%;
            padding: 6px 10px;
            margin-bottom: 3px;
            border: 1px solid rgba(100, 116, 139, 0.1);
            border-radius: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            min-width: 0;
            box-sizing: border-box;
        }
        .timer-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, #3b82f6, #8b5cf6, #3b82f6);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .timer-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            border-color: rgba(100, 116, 139, 0.2);
        }
        .timer-card:hover::before {
            opacity: 1;
        }
        .timer-card.expired {
            opacity: 1;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-color: rgba(245, 158, 11, 0.3);
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }
        .timer-card.expired .timer-label {
            color: #92400e;
            font-weight: 700;
        }
        .timer-card.expired .timer-countdown {
            color: #b45309;
            font-weight: 700;
        }
        .timer-label {
            font-weight: 600;
            font-size: 0.8rem;
            line-height: 1.3;
            color: #1e293b;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .timer-countdown {
            text-align: right;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.75rem;
            line-height: 1.3;
            min-width: 60px;
            font-weight: 600;
            color: #3b82f6;
            flex-shrink: 0;
            white-space: nowrap;
        }
        #timers1, #timers2 {
            display: block;
        }
        .summary-list {
            display: flex;
            flex-wrap: nowrap;
            gap: 4px;
            margin: 0;
            padding: 0;
            overflow-x: auto;
        }
        .summary-item {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 0.7rem;
            line-height: 1.2;
            font-weight: 500;
            color: #0c4a6e;
            white-space: nowrap;
        }
        .summary-item .farm-label {
            font-weight: 600;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            padding: 1px 4px;
            border-radius: 3px;
            display: inline-block;
            margin-right: 2px;
        }
        .status {
            color: #64748b;
            margin-top: 2px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .settings-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 6px;
            padding: 6px 14px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }
        .settings-btn:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        .settings-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .settings-modal-overlay.active {
            display: flex;
        }
        .settings-modal {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .settings-modal h3 {
            margin: 0 0 16px 0;
            font-size: 1.1rem;
            color: #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .settings-modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #64748b;
            padding: 0 4px;
        }
        .settings-modal-close:hover {
            color: #1e293b;
        }
        .settings-category {
            margin-bottom: 12px;
        }
        .settings-category-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #e2e8f0;
        }
        .settings-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 0.85rem;
        }
        .settings-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #3b82f6;
        }
        .settings-item label {
            cursor: pointer;
            flex: 1;
        }
        .settings-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #e2e8f0;
        }
        .settings-actions button {
            flex: 1;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-save {
            background: #3b82f6;
            color: white;
        }
        .btn-save:hover {
            background: #2563eb;
        }
        .btn-select-all {
            background: #e2e8f0;
            color: #1e293b;
        }
        .btn-select-all:hover {
            background: #cbd5e1;
        }
        .btn-deselect-all {
            background: #fee2e2;
            color: #991b1b;
        }
        .btn-deselect-all:hover {
            background: #fca5a5;
        }
        
        /* Auction Section Styles */
        #auction-section {
            display: none; /* Hidden by default, shown when there is auction data */
            margin-bottom: 2px;
        }
        #auction-section.show {
            display: flex;
        }
        .auction-content {
            width: 100%;
        }
        .auction-item {
            background: linear-gradient(135deg, #fffbeb, #fef3c7);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.75rem;
            box-shadow: 0 1px 4px rgba(245, 158, 11, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
            width: 100%;
            height: 30px;
            min-height: 30px;
            box-sizing: border-box;
            overflow: hidden;
            cursor: pointer;
        }
        .auction-item:hover {
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.25);
            transform: translateY(-1px);
        }
        .auction-item-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
            min-width: 0;
        }
        .auction-item-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 3px;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .auction-item-timer {
            text-align: center;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9rem;
            font-weight: 600;
            color: #3b82f6;
            white-space: nowrap;
            flex: 0 0 auto;
        }
        .auction-item-emoji {
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .auction-hide-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            flex-shrink: 0;
            transition: color 0.2s, opacity 0.2s;
            opacity: 0;
        }
        .auction-item:hover .auction-hide-btn {
            opacity: 1;
        }
        .auction-hide-btn:hover {
            color: #ef4444;
        }
        .auction-item-timer {
            text-align: center;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9rem;
            font-weight: 600;
            color: #3b82f6;
            white-space: nowrap;
            flex: 0 0 auto;
        }
        
        /* Auction Modal Styles */
        .auction-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .auction-modal-overlay.active {
            display: flex;
        }
        .auction-modal {
            background: linear-gradient(135deg, #fffbeb, #fef3c7);
            border-radius: 16px;
            padding: 16px;
            width: 98%;
            max-width: 900px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(245, 158, 11, 0.3);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .auction-modal h3 {
            margin: 0 0 12px 0;

        .auction-modal-close {

            border: none;

        }

</head>
<body>
    <div class="page-wrap">
        <div class="farm-container">
            <!-- Auction Section -->
            <div class="global-timer-section" id="auction-section">
                <div id="auction-content" class="auction-content">Loading...</div>
            </div>
            
            <!-- Auction Modal Popup -->
            <div class="auction-modal-overlay" id="auction-modal-overlay" onclick="closeAuctionModal(event)">
                <div class="auction-modal" onclick="event.stopPropagation()">
                    <h3>
                        Upcoming Auctions
                        <button class="auction-modal-close" onclick="closeAuctionModal()">&times;</button>
                    </h3>
                    <div id="auction-modal-content">Loading...</div>
                </div>
            </div>
            
            <!-- Floating Island Timer -->
            <div class="global-timer-section" id="floating-island-timers"></div>
            
            <!-- Daily Timers (Daily Reward & Pirate Chest) -->
            <div class="global-timer-section" id="daily-timers"></div>
            
            <!-- Farm Timers Row -->
            <div class="timers-row">
                <div class="farm-column">
                    <div class="section" id="timers1">
                        <h2 style="margin-top: 0;">Farm - <span id="farm-id-1">Loading...</span></h2>
                    </div>
                </div>
                <div class="farm-column">
                    <div class="section" id="timers2">
                        <h2 style="margin-top: 0;">Farm - <span id="farm-id-2">Loading...</span></h2>
                    </div>
                </div>
                <div class="farm-column">
                    <div class="section" id="timers3">
                        <h2 style="margin-top: 0;">Farm - <span id="farm-id-3">Loading...</span></h2>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script>
        // Request notification permission
        if ('Notification' in window) {
            Notification.requestPermission();
        }

        let audioContext = null;
        function ensureAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume().catch(() => {});
            }
            return audioContext;
        }

        document.body.addEventListener('click', () => {
            ensureAudioContext();
        }, { once: true });

        const farmNames = {
            'timer1': 'Subash',
            'timer2': 'Big Black Clock',
            'timer3': 'Iconic Boy'
        };

        const apiUrls = ['/api/farm', '/api/farm2', '/api/farm3'];
        let refreshTimeoutId = null;
        let countdownIntervalId = null;
        let countdownTasks = [];
        let globalCountdownTasks = [];
        let backoffTimeoutId = null;
        let backoffCountdownIntervalId = null;
        let backoffDelay = 15000;
        let lastSuccessfulTimers = [];
        let lastFetchTime = 0;
        let minFetchInterval = 30000;  // Minimum 30 seconds between fetches

        const FRUIT_PLANT_SECONDS = {

        const FLOWER_PLANT_SECONDS = {
            'Red Pansy': 1 * 24 * 60 * 60,

            'Purple Pansy': 1 * 24 * 60 * 60,

            'Purple Daffodil': 2 * 24 * 60 * 60,
            'White Daffodil': 2 * 24 * 60 * 60,
            'Blue Daffodil': 2 * 24 * 60 * 60,
            'Red Carnation': 5 * 24 * 60 * 60,
            'Yellow Carnation': 5 * 24 * 60 * 60,
            'Purple Carnation': 5 * 24 * 60 * 60,
            'White Carnation': 5 * 24 * 60 * 60,
            'Blue Carnation': 5 * 24 * 60 * 60,
            'Red Lotus': 5 * 24 * 60 * 60,
            'Yellow Lotus': 5 * 24 * 60 * 60,

        function formatCountdown(expiryTimestamp) {
            const now = Date.now();
            const diff = expiryTimestamp - now;
            if (isNaN(diff)) return '--';
            if (diff <= 0) return 'Ready now';

            const seconds = Math.floor(diff / 1000);
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;

            return [
                days ? `${days}d` : null,
                hours ? `${hours}h` : null,
                minutes ? `${minutes}m` : null,
                `${secs}s`,
            ].filter(Boolean).join(' ');
        }

        function getNextDailyReset() {
            const now = new Date();
            const next = new Date(now);
            next.setUTCDate(next.getUTCDate() + 1);
            next.setUTCHours(0, 0, 0, 0);
            return next.getTime();
        }

        function getMagicMushroomSeconds(islandType) {
            const map = {
                basic: 48 * 60 * 60,
                petal_paradise: 36 * 60 * 60,
                desert: 24 * 60 * 60,
                volcano: 22 * 60 * 60,
            };
            return map[islandType] || 48 * 60 * 60;
        }

        function toNumber(value) {
            return Number(value) || 0;
        }

        function addTimer(timers, label, expiry, details = '', count = 1) {
            if (!expiry || isNaN(expiry)) return;
            timers.push({ label, expiry: Number(expiry), details, count });
        }

        function getExpiryFromObject(obj) {
            if (!obj || typeof obj !== 'object') return 0;
            if (obj.readyAt) return toNumber(obj.readyAt);
            if (obj.expiresAt) return toNumber(obj.expiresAt);
            if (obj.completedAt) return toNumber(obj.completedAt);
            if (obj.finishedAt) return toNumber(obj.finishedAt);
            if (obj.startedAt && obj.duration) return toNumber(obj.startedAt) + toNumber(obj.duration);
            if (obj.createdAt && obj.duration) return toNumber(obj.createdAt) + toNumber(obj.duration);
            return 0;
        }

        function getLabelFromObject(obj, path) {
            if (!obj || typeof obj !== 'object') return path;
            const label = obj.name || obj.item || obj.recipe || obj.product || obj.title || obj.type || obj.label;
            if (label) return String(label);
            let defaultLabel = path.replace(/^.*\./, '');
            defaultLabel = defaultLabel.replace(/\[\d+\]/g, '');
            defaultLabel = defaultLabel.replace(/_/g, ' ').replace(/([A-Z])/g, ' $1').trim();
            if (!defaultLabel) return path;
            return defaultLabel.charAt(0).toUpperCase() + defaultLabel.slice(1);
        }

        function addCookingFallbackTimers(timers, obj, path = 'farm') {
            if (!obj || typeof obj !== 'object') return;
            if (Array.isArray(obj)) {
                obj.forEach((item, index) => addCookingFallbackTimers(timers, item, `${path}[${index}]`));
                return;
            }

            const expiry = getExpiryFromObject(obj);
            const lowerPath = path.toLowerCase();
            const cookingKeywords = ['cook', 'kitchen', 'cooking', 'recipe', 'meal', 'oven', 'stove'];
            if (expiry && cookingKeywords.some((keyword) => lowerPath.includes(keyword))) {
                const label = getLabelFromObject(obj, path);
                console.log('Cooking fallback timer', path, label, expiry, obj);
                addTimer(timers, label, expiry, `Detected timer at ${path}`);
            }

            for (const [key, value] of Object.entries(obj)) {
                if (typeof value === 'object' && value !== null) {
                    addCookingFallbackTimers(timers, value, `${path}.${key}`);
                }
            }
        }

        function collectGlobalTimers(farm) {
            const timers = [];
            const now = Date.now();

            // Floating Islands / Mystery Islands - show only the next upcoming timer
            if (farm.floatingIsland?.schedule && Array.isArray(farm.floatingIsland.schedule)) {
                let nextIslandTimer = null;
                let earliestTime = Infinity;
                
                farm.floatingIsland.schedule.forEach((period, index) => {
                    const startTime = toNumber(period.startAt);
                    const endTime = toNumber(period.endAt);
                    
                    // Check for arrival timer
                    if (now < startTime && startTime < earliestTime) {
                        earliestTime = startTime;
                        nextIslandTimer = {
                            label: `Floating Island arrives`,
                            expiry: startTime,
                            details: `Floating island becomes available`,
                            emoji: '🏝️'
                        };
                    }
                    
                    // Check for departure timer (only if island is currently active)
                    if (startTime <= now && now < endTime && endTime < earliestTime) {
                        earliestTime = endTime;
                        nextIslandTimer = {
                            label: `Floating Island leaves`,
                            expiry: endTime,
                            details: `Floating island disappears`,
                            emoji: '🏝️'
                        };
                    }
                });
                
                // Add only the next upcoming timer
                if (nextIslandTimer) {
                    timers.push(nextIslandTimer);
                }
            }

            // Daily reward timer
            if (farm.dailyRewards?.chest?.collectedAt) {
                timers.push({
                    label: 'Daily reward reset',
                    expiry: getNextDailyReset(),
                    details: 'Daily reward chest reset',
                    emoji: '🎁'
                });
            }

            // Pirate chest timer
            if (farm.pumpkinPlaza?.pirateChest?.openedAt) {
                timers.push({
                    label: 'Pirate chest reset',
                    expiry: getNextDailyReset(),
                    details: 'Pirate chest refresh',
                    emoji: '🏴‍☠️'
                });
            }

            return timers;
        }

        function collectTimers(farm, farmIndex = -1) {
            const timers = [];
            const now = Date.now();

            if (farm.vip?.expiresAt) {
                addTimer(timers, 'VIP Expiration', farm.vip.expiresAt, 'VIP bundle expiration');
            }

            function addResourceTimers(resourceName, entries, timestampKey, fieldPath) {
                if (!entries || typeof entries !== 'object') return;
                for (const [id, entry] of Object.entries(entries)) {
                    const data = entry[fieldPath];
                    if (!data || !data[timestampKey]) continue;
                    const timestamp = toNumber(data[timestampKey]);
                    const recovery = RESOURCE_RECOVERY_SECONDS[resourceName];
                    if (!recovery) continue;
                    const expiry = timestamp + recovery * 1000;
                    addTimer(timers, resourceName, expiry, `Next ${resourceName.toLowerCase()} ready`);
                }
            }

            addResourceTimers('Tree', farm.trees, 'choppedAt', 'wood');
            addResourceTimers('Stone', farm.stones, 'minedAt', 'stone');
            addResourceTimers('Iron', farm.iron, 'minedAt', 'stone');
            addResourceTimers('Gold', farm.gold, 'minedAt', 'stone');
            addResourceTimers('Crimstone', farm.crimstones, 'minedAt', 'stone');
            addResourceTimers('Sunstone', farm.sunstones, 'minedAt', 'stone');
            addResourceTimers('Oil', farm.oilReserves, 'drilledAt', 'oil');

            if (farm.crops && typeof farm.crops === 'object') {
                for (const [_plotId, plot] of Object.entries(farm.crops)) {
                    const crop = plot?.crop;
                    if (!crop || !crop.plantedAt || !crop.name) continue;
                    const harvestSeconds = CROP_HARVEST_SECONDS[crop.name];
                    if (!harvestSeconds) continue;
                    const expiry = toNumber(crop.plantedAt) + harvestSeconds * 1000;
                    addTimer(timers, crop.name, expiry, 'Crop harvest ready');
                }
            }

            if (farm.fruitPatches && typeof farm.fruitPatches === 'object') {
                for (const [_patchId, patch] of Object.entries(farm.fruitPatches)) {
                    const fruit = patch?.fruit;
                    if (!fruit || !fruit.name) continue;
                    const plantSeconds = FRUIT_PLANT_SECONDS[fruit.name];
                    if (!plantSeconds) continue;
                    const timestamp = toNumber(fruit.harvestedAt || fruit.plantedAt);
                    const expiry = timestamp + plantSeconds * 1000;
                    if (fruit.harvestsLeft > 0) {
                        addTimer(timers, fruit.name, expiry, 'Fruit harvest ready');
                    }
                }
            }

            if (farm.flowers?.flowerBeds && typeof farm.flowers.flowerBeds === 'object') {
                for (const [_bedId, bed] of Object.entries(farm.flowers.flowerBeds)) {
                    const flower = bed?.flower;
                    if (!flower || !flower.plantedAt || !flower.name) continue;
                    const flowerSeconds = FLOWER_PLANT_SECONDS[flower.name];
                    if (!flowerSeconds) continue;
                    const expiry = toNumber(flower.plantedAt) + flowerSeconds * 1000;
                    addTimer(timers, flower.name, expiry, 'Flower bloom ready');
                }
            }

            if (farm.greenhouse?.pots && typeof farm.greenhouse.pots === 'object') {
                for (const [_potId, pot] of Object.entries(farm.greenhouse.pots)) {
                    const plant = pot?.plant;
                    if (!plant || !plant.plantedAt || !plant.name) continue;
                    const harvestSeconds = GREENHOUSE_HARVEST_SECONDS[plant.name];
                    if (!harvestSeconds) continue;
                    const expiry = toNumber(plant.plantedAt) + harvestSeconds * 1000;
                    addTimer(timers, `${plant.name} greenhouse`, expiry, 'Greenhouse harvest ready');
                }
            }

            if (farm.mushrooms) {
                const islandType = farm.island?.type || 'basic';
                if (farm.mushrooms.spawnedAt) {
                    const expiry = toNumber(farm.mushrooms.spawnedAt) + 16 * 60 * 60 * 1000;
                    addTimer(timers, 'Wild Mushroom', expiry, 'Wild mushroom harvest ready');
                }
                if (farm.mushrooms.magicSpawnedAt) {
                    const expiry = toNumber(farm.mushrooms.magicSpawnedAt) + getMagicMushroomSeconds(islandType) * 1000;
                    addTimer(timers, 'Magic Mushroom', expiry, 'Magic mushroom ready');
                }
            }

            if (farm.bumpkin?.previousPowerUseAt && typeof farm.bumpkin.previousPowerUseAt === 'object') {
                for (const [powerName, usedAt] of Object.entries(farm.bumpkin.previousPowerUseAt)) {
                    const lastUsed = toNumber(usedAt);
                    const cooldown = POWER_COOLDOWN_SECONDS[powerName];
                    if (!cooldown || !lastUsed) continue;
                    const expiry = lastUsed + cooldown * 1000;
                    const sevenDaysMs = 7 * 24 * 60 * 60 * 1000; // 7 days in milliseconds
                    // Show powerups that are still on cooldown OR ready now (but not older than 7 days)
                    if (expiry > Date.now() - sevenDaysMs) {
                        addTimer(timers, `${powerName} cooldown`, expiry, 'Power becomes available');
                    }
                }
            }

            // Daily reward and pirate chest timers are now shown in the global timer section

            if (farm.buildings && typeof farm.buildings === 'object') {
                for (const [buildingType, list] of Object.entries(farm.buildings)) {
                    if (!Array.isArray(list)) continue;
                    list.forEach((building) => {
                        const readyAt = toNumber(building.readyAt);
                        if (readyAt) {
                            addTimer(timers, buildingType, readyAt, 'Building ready');
                        }
                        if (building.producing?.readyAt) {
                            const itemExpiry = toNumber(building.producing.readyAt);
                            addTimer(timers, `${buildingType} production`, itemExpiry, 'Production ready');
                        }
                        if (Array.isArray(building.crafting)) {
                            building.crafting.forEach((task) => {
                                const craftExpiry = toNumber(task.readyAt);
                                if (craftExpiry) {
                                    addTimer(timers, task.name || `${buildingType} craft`, craftExpiry, 'Crafting ready');
                                }
                            });
                        }
                    });
                }
            }

            // Animals (Chickens, Cows, Sheep) - from henHouse and barn
            if (farm.henHouse?.animals && typeof farm.henHouse.animals === 'object') {
                for (const [animalId, animal] of Object.entries(farm.henHouse.animals)) {
                    if (!animal || !animal.awakeAt || !animal.asleepAt) continue;
                    
                    const awakeTime = toNumber(animal.awakeAt);
                    const asleepTime = toNumber(animal.asleepAt);
                    const lovedTime = toNumber(animal.lovedAt || 0);
                    const animalType = animal.type || 'Chicken';
                    
                    // Love time calculation (1/3 of sleep cycle)
                    const sleepCycleDuration = awakeTime - asleepTime;
                    const lovePeriodDuration = sleepCycleDuration / 3;
                    const firstLoveAvailableAt = asleepTime + lovePeriodDuration;
                    
                    let nextLoveTime;
                    if (lovedTime > 0) {
                        nextLoveTime = lovedTime + lovePeriodDuration;
                        nextLoveTime = Math.max(firstLoveAvailableAt, nextLoveTime);
                    } else {
                        nextLoveTime = firstLoveAvailableAt;
                    }
                    
                    const now = Date.now();
                    const isWakeReady = awakeTime <= now;
                    const isLoveReady = nextLoveTime <= now;
                    
                    // When both are ready, only show wake (not love) to avoid duplicate "Ready now" entries
                    // When both are active, show both timers
                    // When wake is ready but love is not, show wake as ready and love as countdown
                    if (isWakeReady && isLoveReady) {
                        // Both ready - only show wake
                        addTimer(timers, `${animalType} wake`, awakeTime, `${animalType} wakes up`);
                    } else {
                        // Show both timers (they will show as countdown or ready based on their individual times)
                        addTimer(timers, `${animalType} wake`, awakeTime, `${animalType} wakes up`);
                        addTimer(timers, `${animalType} love`, nextLoveTime, `${animalType} ready for love`);
                    }
                }
            }

            if (farm.barn?.animals && typeof farm.barn.animals === 'object') {
                for (const [animalId, animal] of Object.entries(farm.barn.animals)) {
                    if (!animal || !animal.awakeAt || !animal.asleepAt) continue;
                    
                    const awakeTime = toNumber(animal.awakeAt);
                    const asleepTime = toNumber(animal.asleepAt);
                    const lovedTime = toNumber(animal.lovedAt || 0);
                    const animalType = animal.type || 'Animal';
                    
                    // Love time calculation (1/3 of sleep cycle)
                    const sleepCycleDuration = awakeTime - asleepTime;
                    const lovePeriodDuration = sleepCycleDuration / 3;
                    const firstLoveAvailableAt = asleepTime + lovePeriodDuration;
                    
                    let nextLoveTime;
                    if (lovedTime > 0) {
                        nextLoveTime = lovedTime + lovePeriodDuration;
                        nextLoveTime = Math.max(firstLoveAvailableAt, nextLoveTime);
                    } else {
                        nextLoveTime = firstLoveAvailableAt;
                    }
                    
                    const now = Date.now();
                    const isWakeReady = awakeTime <= now;
                    const isLoveReady = nextLoveTime <= now;
                    
                    // When both are ready, only show wake (not love) to avoid duplicate "Ready now" entries
                    // When both are active, show both timers
                    // When wake is ready but love is not, show wake as ready and love as countdown
                    if (isWakeReady && isLoveReady) {
                        // Both ready - only show wake
                        addTimer(timers, `${animalType} wake`, awakeTime, `${animalType} wakes up`);
                    } else {
                        // Show both timers (they will show as countdown or ready based on their individual times)
                        addTimer(timers, `${animalType} wake`, awakeTime, `${animalType} wakes up`);
                        addTimer(timers, `${animalType} love`, nextLoveTime, `${animalType} ready for love`);
                    }
                }
            }

            // Lava Pit Timer
            if (farm.lavaPlaza?.lavaPit?.drilledAt) {
                const drilledAt = toNumber(farm.lavaPlaza.lavaPit.drilledAt);
                const lavaPitDuration = 72 * 60 * 60 * 1000;
                const expiry = drilledAt + lavaPitDuration;
                addTimer(timers, 'Lava Pit', expiry, 'Lava pit ready');
            }

            // VIP Chest Resets
            if (farm.vipChest?.openedAt) {
                const nextReset = getNextDailyReset();
                addTimer(timers, 'VIP Chest reset', nextReset, 'VIP chest resets');
            }

            // Bud Box Resets
            if (farm.budBox?.openedAt) {
                const nextReset = getNextDailyReset();
                addTimer(timers, 'Bud Box reset', nextReset, 'Bud box resets');
            }

            // Shrine Expiries
            if (farm.pumpkinPlaza?.shrines && typeof farm.pumpkinPlaza.shrines === 'object') {
                const shrineNames = ['Fox', 'Hound', 'Boar', 'Sparrow', 'Toucan', 'Collie', 'Badger', 'Stag', 'Mole', 'Bear', 'Tortoise', 'Moth', 'Bantam'];
                for (const shrineName of shrineNames) {
                    const shrine = farm.pumpkinPlaza.shrines[shrineName];
                    if (shrine?.expiresAt) {
                        const expiryTime = toNumber(shrine.expiresAt);
                        addTimer(timers, `${shrineName} Shrine`, expiryTime, `${shrineName} shrine expires`);
                    }
                }
                if (farm.pumpkinPlaza.shrines['Legendary']?.expiresAt) {
                    const expiryTime = toNumber(farm.pumpkinPlaza.shrines['Legendary'].expiresAt);
                    addTimer(timers, 'Legendary Shrine', expiryTime, 'Legendary shrine expires');
                }
                if (farm.pumpkinPlaza.shrines['Obsidian']?.expiresAt) {
                    const expiryTime = toNumber(farm.pumpkinPlaza.shrines['Obsidian'].expiresAt);
                    addTimer(timers, 'Obsidian Shrine', expiryTime, 'Obsidian shrine expires');
                }
                if (farm.pumpkinPlaza.shrines['Trading']?.expiresAt) {
                    const expiryTime = toNumber(farm.pumpkinPlaza.shrines['Trading'].expiresAt);
                    addTimer(timers, 'Trading Shrine', expiryTime, 'Trading shrine expires');
                }
            }

            // Beehive Timers - NEW IMPLEMENTATION
            // Beehives structure: farm.beehives = { [hiveId]: { flowers: [{ attachedUntil: timestamp }] } }
            if (farm.beehives && typeof farm.beehives === 'object') {
                let activeBeehiveCount = 0;
                let earliestExpiry = null;
                let hasExpiredBeehive = false;
                
                for (const [hiveId, hive] of Object.entries(farm.beehives)) {
                    if (!hive || !hive.flowers || !Array.isArray(hive.flowers)) continue;
                    
                    // Check each flower in this hive
                    for (const flower of hive.flowers) {
                        if (!flower.attachedUntil) continue;
                        
                        // Get the timestamp value
                        let timestamp = toNumber(flower.attachedUntil);
                        if (timestamp <= 0) continue;
                        
                        // Determine if timestamp is in seconds or milliseconds
                        // Unix timestamps (seconds) are typically 10 digits (e.g., 1712345678)
                        // JS timestamps (milliseconds) are typically 13 digits (e.g., 1712345678000)
                        let expiryMs;
                        if (timestamp < 10000000000) {
                            // Timestamp is in seconds, convert to milliseconds
                            expiryMs = timestamp * 1000;
                        } else {
                            // Timestamp is already in milliseconds
                            expiryMs = timestamp;
                        }
                        
                        // Track if this beehive has an active flower (future expiry)
                        if (expiryMs > Date.now()) {
                            activeBeehiveCount++;
                            if (earliestExpiry === null || expiryMs < earliestExpiry) {
                                earliestExpiry = expiryMs;
                            }
                        } else {
                            // This beehive has expired
                            hasExpiredBeehive = true;
                        }
                    }
                }
                
                // Add timer for active beehives (showing countdown)
                if (activeBeehiveCount > 0 && earliestExpiry !== null) {
                    if (activeBeehiveCount === 1) {
                        addTimer(timers, 'Beehive', earliestExpiry, 'Beehive flower attachment expires');
                    } else {
                        addTimer(timers, 'Beehive', earliestExpiry, 'Beehive flower attachment expires', activeBeehiveCount);
                    }
                }
                
                // Add "Ready now" timer for expired beehives
                if (hasExpiredBeehive) {
                    // Use current time as expiry (will show as "Ready now")
                    addTimer(timers, 'Beehive', Date.now(), 'Beehive flower attachment expired');
                }
            }

            // Pet Timers
            if (farm.pets && typeof farm.pets === 'object') {
                // Handle NFT pets
                if (farm.pets.nfts && typeof farm.pets.nfts === 'object') {
                    for (const [petId, petData] of Object.entries(farm.pets.nfts)) {
                        const petName = petData.name || `NFT Pet ${petId}`;
                        
                        // Nap/Caress timer
                        if (petData.pettedAt) {
                            const napFinishedAt = toNumber(petData.pettedAt) + 2 * 60 * 60 * 1000; // 2 hours
                            if (napFinishedAt > now) {
                                addTimer(timers, `${petName} nap`, napFinishedAt, `${petName} finished napping`);
                            }
                        }
                        
                        // Feed timer (daily)
                        if (petData.requests?.fedAt) {
                            const fedAt = toNumber(petData.requests.fedAt);
                            const todayStart = new Date(now);
                            todayStart.setUTCHours(0, 0, 0, 0);
                            const todayStartMs = todayStart.getTime();
                            
                            if (fedAt >= todayStartMs) {
                                // Already fed today, next feed tomorrow
                                const nextFeedTime = todayStartMs + 24 * 60 * 60 * 1000;
                                addTimer(timers, `${petName} feed`, nextFeedTime, `${petName} can be fed again`);
                            } else {
                                // Not fed today, can feed now
                                addTimer(timers, `${petName} feed`, now - 1000, `${petName} can be fed`);
                            }
                        }
                    }
                }
                
                // Handle common pets
                if (farm.pets.common && typeof farm.pets.common === 'object') {
                    for (const [petName, petData] of Object.entries(farm.pets.common)) {
                        // Nap/Caress timer
                        if (petData.pettedAt) {
                            const napFinishedAt = toNumber(petData.pettedAt) + 2 * 60 * 60 * 1000; // 2 hours
                            if (napFinishedAt > now) {
                                addTimer(timers, `${petName} nap`, napFinishedAt, `${petName} finished napping`);
                            }
                        }
                        
                        // Feed timer (daily)
                        if (petData.requests?.fedAt) {
                            const fedAt = toNumber(petData.requests.fedAt);
                            const todayStart = new Date(now);
                            todayStart.setUTCHours(0, 0, 0, 0);
                            const todayStartMs = todayStart.getTime();
                            
                            if (fedAt >= todayStartMs) {
                                // Already fed today, next feed tomorrow
                                const nextFeedTime = todayStartMs + 24 * 60 * 60 * 1000;
                                addTimer(timers, `${petName} feed`, nextFeedTime, `${petName} can be fed again`);
                            } else {
                                // Not fed today, can feed now
                                addTimer(timers, `${petName} feed`, now - 1000, `${petName} can be fed`);
                            }
                        }
                    }
                }
            }

            addCookingFallbackTimers(timers, farm, 'farm');

            // Group timers by label and handle ready/pending separately
            const grouped = {};
            const allExpiries = {}; // Store all expiries for each label
            
            timers.forEach((timer) => {
                const key = timer.label;
                if (!allExpiries[key]) {
                    allExpiries[key] = [];
                }
                allExpiries[key].push(timer.expiry);
            });
            
            // For each group, create separate entries for ready and pending items
            for (const [label, expiries] of Object.entries(allExpiries)) {
                const now = Date.now();
                const readyExpiries = expiries.filter(e => e <= now);
                const pendingExpiries = expiries.filter(e => e > now).sort((a, b) => a - b);
                
                // If there are ready items, show them as ready
                if (readyExpiries.length > 0) {
                    const count = readyExpiries.length;
                    const displayLabel = count > 1 ? `${label} x${count}` : label;
                    // Use the most recent expiry (closest to now but still past)
                    const expiry = Math.max(...readyExpiries);
                    grouped[`${label}_ready`] = { 
                        label: displayLabel, 
                        expiry: expiry, 
                        details: timers.find(t => t.label === label)?.details || '',
                        count: 1
                    };
                }
                
                // If there are pending items, show them with the next closest timer
                if (pendingExpiries.length > 0) {
                    const count = pendingExpiries.length;
                    const displayLabel = count > 1 ? `${label} x${count}` : label;
                    // Use the earliest future expiry
                    const expiry = pendingExpiries[0];
                    grouped[`${label}_pending`] = { 
                        label: displayLabel, 
                        expiry: expiry, 
                        details: timers.find(t => t.label === label)?.details || '',
                        count: 1
                    };
                }
            }

            return Object.values(grouped)
                .filter((timer) => timer.details !== 'Building ready')
                .sort((a, b) => {
                    const now = Date.now();
                    const aReady = a.expiry <= now ? 1 : 0;
                    const bReady = b.expiry <= now ? 1 : 0;

                    // Ready items (expired timers) come first
                    if (aReady !== bReady) return bReady - aReady;
                    
                    // For ready items, sort by how long ago they expired (most recently expired first)
                    if (aReady && bReady) {
                        return b.expiry - a.expiry; // More negative (longer ago) comes after
                    }
                    
                    // For non-ready items, sort by remaining time (lowest first)
                    return a.expiry - b.expiry;
                });
        }

        function scheduleNextRefresh(timers) {
            if (refreshTimeoutId) {
                clearTimeout(refreshTimeoutId);
                refreshTimeoutId = null;
            }

            if (backoffTimeoutId) {
                return;
            }

            if (!timers.length) return;
            const now = Date.now();
            const hasExpired = timers.some((timer) => timer.expiry <= now);
            if (hasExpired) {
                refreshTimeoutId = setTimeout(fetchData, 500);
                return;
            }

            const nextExpiry = timers.reduce((next, timer) => {
                return timer.expiry > now ? Math.min(next, timer.expiry) : next;
            }, Infinity);

            if (nextExpiry < Infinity) {
                refreshTimeoutId = setTimeout(fetchData, Math.max(nextExpiry - now + 500, 500));
            }
        }

        function ensureCountdownUpdater() {
            if (countdownIntervalId) return;
            if (!countdownTasks.length && !auctionTimerData) return;

            countdownIntervalId = setInterval(() => {
                const now = Date.now();
                
                // Update farm timers
                countdownTasks.forEach((task) => {
                    const label = document.getElementById(`${task.prefix}-${task.index}`);
                    if (!label) {
                        return;
                    }
                    const wasReady = label.textContent === 'Ready now';
                    const newText = formatCountdown(task.timer.expiry);
                    label.textContent = newText;
                    if (!wasReady && newText === 'Ready now') {
                        notifyTimerReady(task.timer.label, task.prefix);
                    }
                });
                
                // Update global timers (floating island and daily timers)
                globalCountdownTasks.forEach((task) => {
                    const countdownElement = document.getElementById(task.elementId);
                    if (!countdownElement) return;
                    
                    const wasReady = countdownElement.textContent === 'Ready now';
                    const newText = formatCountdown(task.timer.expiry);
                    countdownElement.textContent = newText;
                    countdownElement.className = `global-timer-countdown ${task.timer.expiry <= now ? 'expired' : ''}`;
                    if (!wasReady && newText === 'Ready now') {
                        // Global timer notification with duplicate prevention
                        const isFloatingIsland = task.timer.label.includes('Floating Island');
                        const isDaily = task.timer.label.includes('Daily') || task.timer.label.includes('Pirate');
                        
                        if (isFloatingIsland && !notifiedFloatingIslandTimers.has(task.timer.label)) {
                            notifiedFloatingIslandTimers.add(task.timer.label);
                            if ('Notification' in window && Notification.permission === 'granted') {
                                new Notification(`${task.timer.label} ready!`, {
                                    body: task.timer.details,
                                    icon: '/favicon.ico'
                                });
                            } else {
                                alert(`${task.timer.label} ready!`);
                            }
                        } else if (isDaily && !notifiedDailyTimers.has(task.timer.label)) {
                            notifiedDailyTimers.add(task.timer.label);
                            if ('Notification' in window && Notification.permission === 'granted') {
                                new Notification(`${task.timer.label} ready!`, {
                                    body: task.timer.details,
                                    icon: '/favicon.ico'
                                });
                            } else {
                                alert(`${task.timer.label} ready!`);
                            }
                        }
                    }
                });
                
                // Update auction timer
                if (auctionTimerData) {
                    const auctionElement = document.getElementById(auctionTimerData.elementId);
                    if (auctionElement) {
                        const newText = formatCountdown(auctionTimerData.expiry);
                        auctionElement.textContent = newText;

        async function fetchData() {
            try {
                const now = Date.now();
                // Prevent fetching too frequently
                if (now - lastFetchTime < minFetchInterval) {
                    return;
                }
                lastFetchTime = now;

                if (refreshTimeoutId) {
                    clearTimeout(refreshTimeoutId);
                    refreshTimeoutId = null;
                }

                if (backoffTimeoutId) {
                    clearTimeout(backoffTimeoutId);
                    backoffTimeoutId = null;
                }

                const responses = await Promise.allSettled(apiUrls.map(url => fetch(url)));
                const datas = Array(apiUrls.length).fill(null);
                const rateLimitedIndices = [];

        function playBellSound() {
            try {
                const audioContext = ensureAudioContext();
                if (!audioContext) return;

                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                const metal = audioContext.createOscillator();
                const metalGain = audioContext.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
                metal.type = 'triangle';
                metal.frequency.setValueAtTime(1320, audioContext.currentTime);
                metalGain.gain.setValueAtTime(0.03, audioContext.currentTime);

                gainNode.gain.setValueAtTime(0.0001, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.18, audioContext.currentTime + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1.2);

                oscillator.connect(gainNode);
                metal.connect(metalGain);
                metalGain.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.start(audioContext.currentTime);
                metal.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 1.2);
                metal.stop(audioContext.currentTime + 1.2);
            } catch (e) {
                console.log('Audio not supported', e);
            }
        }

        // Storage abstraction layer - uses localStorage with cookie fallback
        const storage = {
            get: function(key) {
                if (isLocalStorageAvailable()) {
                    return localStorage.getItem(key);
                }
                // Fallback to cookies
                const name = key + '=';
                const decodedCookie = decodeURIComponent(document.cookie);
                const ca = decodedCookie.split(';');
                for (let i = 0; i < ca.length; i++) {
                    let c = ca[i].trim();
                    if (c.indexOf(name) === 0) {
                        return c.substring(name.length);
                    }
                }
                return null;
            },
            set: function(key, value) {
                if (isLocalStorageAvailable()) {
                    localStorage.setItem(key, value);
                }
                // Also save to cookie as fallback
                const expires = new Date();
                expires.setFullYear(expires.getFullYear() + 1);
                document.cookie = key + '=' + encodeURIComponent(value) + ';expires=' + expires.toUTCString() + ';path=/';
            }
        };

        // Store auction start time (10 min before end)
        let auctionStartTime = null;
        let currentAuctionData = null;
        let allAuctionsList = []; // Store all auctions for modal display
        
        function renderAuctionData(auctions) {
            const content = document.getElementById('auction-content');
            const section = document.getElementById('auction-section');
            
            // Handle different API response formats
            let auctionList = [];
            if (Array.isArray(auctions)) {
                auctionList = auctions;
            } else if (auctions.list && Array.isArray(auctions.list)) {
                // SFL auction API format: { list: [...], totalSupply: {...} }
                auctionList = auctions.list;
            } else if (auctions.auctions && Array.isArray(auctions.auctions)) {
                auctionList = auctions.auctions;
            } else if (auctions.data && Array.isArray(auctions.data)) {
                auctionList = auctions.data;
            }
            
            if (auctionList.length === 0) {
                // Check if there's a message from the server
                const serverMessage = auctions.message || '';
                if (serverMessage) {
                    content.innerHTML = `<span class="status">Auctions: ${serverMessage}</span>`;
                } else {
                    content.innerHTML = '<span class="status">No active auctions</span>';
                }
                section.classList.remove('show');
                return;
            }
            
            const now = Date.now();
            const tenMinutesMs = 10 * 60 * 1000;
            const sevenDaysMs = 7 * 24 * 60 * 60 * 1000;
            
            // Find the next upcoming auction within 7 days
            const upcomingAuctions = auctionList
                .filter(a => a.endAt && toNumber(a.endAt) > now && toNumber(a.endAt) <= now + sevenDaysMs)
                .sort((a, b) => toNumber(a.endAt) - toNumber(b.endAt));
            
            if (upcomingAuctions.length === 0) {
                content.innerHTML = '<span class="status">No upcoming auctions</span>';
                section.classList.remove('show');
                return;
            }
            
            // Show the auction section
            section.classList.add('show');
            
            // Store all upcoming auctions for modal display
            allAuctionsList = upcomingAuctions;
            
            // Get the first upcoming auction
            const auction = upcomingAuctions[0];
            const endTime = toNumber(auction.endAt);
            const startTime = endTime - tenMinutesMs; // Start 10 min before end
            
            // Get item info
            const itemName = auction.nft || auction.collectible || auction.wearable || auction.name || auction.item || 'Unknown';
            const emoji = getItemEmoji(itemName, '');
            
            // Determine auction type (SFL, GEM, or Floater)
            let auctionType = '';
            if (auction.sflAmount) {
                auctionType = 'SFL';
            } else if (auction.gemAmount || auction.gems) {
                auctionType = 'GEM';
            } else if (auction.floaterAmount || auction.floater) {
                auctionType = 'Floater';
            } else {
                auctionType = 'SFL'; // Default to SFL
            }
            
            let supplyText = '';
            if (auction.sflAmount) {
                supplyText = `${auction.sflAmount} SFL`;
            } else if (auction.gemAmount) {
                supplyText = `${auction.gemAmount} GEM`;
            } else if (auction.gems) {
                supplyText = `${auction.gems} GEM`;
            } else if (auction.floaterAmount) {
                supplyText = `${auction.floaterAmount} Floater`;
            } else if (auction.floater) {
                supplyText = `${auction.floater} Floater`;
            } else if (auction.amount) {
                supplyText = `x${auction.amount}`;
            } else if (auction.supply) {
                supplyText = `x${auction.supply}`;
            }
            
            // Store for countdown updates
            auctionStartTime = startTime;
            currentAuctionData = { auction, itemName, emoji, supplyText, endTime, startTime };
            
            // Determine status and countdown target
            let status, countdownTarget;
            if (now < startTime) {
                // Before start - show "Upcoming" with countdown to start
                status = 'Upcoming';
                countdownTarget = startTime;
            } else if (now >= startTime && now < endTime) {
                // Started - show "Auction is LIVE" with countdown to end
                status = 'Auction is LIVE';
                countdownTarget = endTime;
            } else {
                // Ended - will show next auction on next refresh
                status = 'Ended';
                countdownTarget = endTime;
            }
            
            // Store auction timer data for countdown updates
            auctionTimerData = {
                expiry: countdownTarget,
                elementId: 'auction-timer-0',
                status: status,
                statusElementId: 'auction-status-0'
            };
            
            const countdown = formatCountdown(countdownTarget);
            
            const html = `<div class="auction-item" onclick="showAuctionModal()">
                <div class="auction-item-content">
                    <span class="auction-item-name">Auction - ${emoji} ${itemName}${supplyText ? ' (' + supplyText + ')' : ''} <span id="auction-status-0" style="color: ${status === 'Started' ? '#ef4444' : '#3b82f6'}; font-weight: 600;">[${status}]</span></span>
                    <span class="auction-item-timer" id="auction-timer-0">${countdown}</span>
                </div>
                <button class="auction-hide-btn" onclick="event.stopPropagation(); hideAuctionSection()" title="Hide auction">×</button>
            </div>`;
            
            content.innerHTML = html;
        }
        
        // Initialize settings on page load
        loadSettings();
        
        function hideAuctionSection() {
            const section = document.getElementById('auction-section');
            section.classList.remove('show');
        }
        
        // Show auction modal with all upcoming auctions
        function showAuctionModal() {
            const overlay = document.getElementById('auction-modal-overlay');
            const content = document.getElementById('auction-modal-content');
            
            // Get all upcoming auctions within 7 days from the stored list
            const now = Date.now();
            const sevenDaysMs = 7 * 24 * 60 * 60 * 1000;
            const upcomingAuctions = (allAuctionsList || [])
                .filter(a => a.endAt && toNumber(a.endAt) > now && toNumber(a.endAt) <= now + sevenDaysMs)
                .sort((a, b) => toNumber(a.endAt) - toNumber(b.endAt));
            
            if (upcomingAuctions.length === 0) {
                content.innerHTML = '<p class="status">No upcoming auctions within 7 days</p>';
            } else {
                let html = '';
                upcomingAuctions.forEach((auction, index) => {
                    const endTime = toNumber(auction.endAt);
                    const startTime = endTime - 10 * 60 * 1000;
                    const itemName = auction.nft || auction.collectible || auction.wearable || auction.name || auction.item || 'Unknown';
                    const emoji = getItemEmoji(itemName, '');
                    
                    // Determine auction type (SFL, GEM, or Floater)
                    let auctionType = 'SFL';
                    if (auction.sflAmount) auctionType = 'SFL';
                    else if (auction.gemAmount || auction.gems) auctionType = 'GEM';
                    else if (auction.floaterAmount || auction.floater) auctionType = 'Floater';
                    
                    let supplyText = '';
                    if (auction.sflAmount) supplyText = `${auction.sflAmount} SFL`;
                    else if (auction.gemAmount) supplyText = `${auction.gemAmount} GEM`;
                    else if (auction.gems) supplyText = `${auction.gems} GEM`;
                    else if (auction.floaterAmount) supplyText = `${auction.floaterAmount} Floater`;
                    else if (auction.floater) supplyText = `${auction.floater} Floater`;
                    else if (auction.amount) supplyText = `x${auction.amount}`;
                    else if (auction.supply) supplyText = `x${auction.supply}`;
                    
                    let status, countdownTarget;
                    if (now < startTime) {
                        status = 'Upcoming';
                        countdownTarget = startTime;
                    } else if (now >= startTime && now < endTime) {
                        status = 'Auction is LIVE';
                        countdownTarget = endTime;
                    } else {
                        status = 'Ended';
                        countdownTarget = endTime;
                    }
                    
                    const countdown = formatCountdown(countdownTarget);
                    const statusClass = status === 'Auction is LIVE' ? 'live' : 'upcoming';
                    
                    html += `<div class="auction-modal-item">
                        <div class="auction-modal-item-name">
                            ${emoji} ${itemName}${supplyText ? ' (' + supplyText + ')' : ''}
                            <span class="auction-modal-item-status ${statusClass}">${auctionType} - ${status}</span>
                        </div>
                        <div class="auction-modal-item-info">
                            <span class="auction-modal-item-timer">${countdown}</span>
                        </div>
                    </div>`;
                });
                content.innerHTML = html;
            }
            
            overlay.classList.add('active');
        }
        
        // Close auction modal
        function closeAuctionModal(event) {
            if (!event || event.target === document.getElementById('auction-modal-overlay')) {
                document.getElementById('auction-modal-overlay').classList.remove('active');
            }
        }
        
        // Fetch auction data
        fetchAuctionData();
        
        // Start the initial data fetch
        fetchData();
    </script>
</body>
